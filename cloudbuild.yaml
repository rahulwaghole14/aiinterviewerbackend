steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ai-interviewer-backend:$COMMIT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/ai-interviewer-backend:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ai-interviewer-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ai-interviewer-backend:$COMMIT_SHA'
      - '--platform'
      - 'managed'
      - '--region'
      - 'asia-southeast1'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances'
      - '$PROJECT_ID:asia-southeast1:talaroai'
      - '--set-env-vars'
      - 'DATABASE_URL=postgresql://ai_user:YourSecureUserPassword123!@/$PROJECT_ID:asia-southeast1:talaroai/ai_interviewer_db?host=/cloudsql/$PROJECT_ID:asia-southeast1:talaroai'
      - '--set-env-vars'
      - 'SECRET_KEY=your-django-secret-key-change-this'
      - '--set-env-vars'
      - 'DEBUG=False'
      - '--set-env-vars'
      - 'GS_BUCKET_NAME=ai-interview-files-$PROJECT_ID'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID'

substitutions:
  _CLOUD_SQL_CONNECTION_NAME: '$PROJECT_ID:asia-southeast1:talaroai'
  _DATABASE_URL: 'postgresql://ai_user:YourSecureUserPassword123!@/$PROJECT_ID:asia-southeast1:talaroai/ai_interviewer_db?host=/cloudsql/$PROJECT_ID:asia-southeast1:talaroai'
  _SECRET_KEY: 'your-django-secret-key-change-this'
  _GCS_BUCKET_NAME: 'ai-interview-files-$PROJECT_ID'

options:
  logging: CLOUD_LOGGING_ONLY